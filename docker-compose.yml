services:
  db:
    image: postgres:16-alpine
    container_name: workhive-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-workhive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workhive_secret}
      POSTGRES_DB: ${POSTGRES_DB:-workhive}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-workhive} -d ${POSTGRES_DB:-workhive}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workhive-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
